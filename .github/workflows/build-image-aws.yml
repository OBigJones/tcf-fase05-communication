name: CI - CD - Local - Build, Testes e DockerHub

on:
  pull_request:
    branches: [ "develop", "main" ]
  push:
    branches:
      - "main"
      - "develop"
      - "release/*"

env:
  DOCKERHUB_PROJECT: "fase-05-communication"
  SONAR_PROJECT_KEY: "tcf-fase05-communication"
  SONAR_O: "obigjones"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Install SonarCloud Scanner
        run: |
          dotnet tool install --global dotnet-sonarscanner
          dotnet tool install --global dotnet-coverage

#      - name: Begin Sonar Analysis
#        env:
#          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
#          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
#        run: |
#          dotnet-sonarscanner begin /k:"${{ env.SONAR_PROJECT_KEY }}" /o:"${{ env.SONAR_O }}" \
#          /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
#          /d:sonar.host.url="https://sonarcloud.io" \
#          /d:sonar.cs.vscoveragexml.reportsPaths=coverage.xml \
#          /d:sonar.qualitygate.wait=true

      - name: Build and Test with Coverage
        run: |
          # O comando dotnet-coverage collect gera o XML que o Sonar espera
          dotnet-coverage collect --output coverage.xml --output-format xml dotnet test

#      - name: End Sonar Analysis
#        env:
#          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
#          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
#        run: dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
        
  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    
    if: github.event_name == 'push'
    
    permissions:
      contents: read
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_PROJECT }}:latest